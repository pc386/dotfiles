general {
    # Honor application idle inhibitors, e.g. during video playback or calls.
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
    ignore_wayland_inhibit = false
}

# Reduce OLED brightness before switching the panel off.
listener {
    timeout = 300
    on-timeout = brightnessctl -s set 2%
    on-resume = brightnessctl -r
}

# Turn the OLED panel completely off after 5.5 minutes.
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes of inactivity.
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
